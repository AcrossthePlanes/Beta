// 核心魔法：智能生成并连接节点 (支持自定义ID)
function autoGenerateNodeForChoice(btn) {
    const targetInput = btn.parentElement.querySelector('.choice-target-input');
    let targetId = targetInput.value.trim();

    // 1. 智能判定目标 ID
    if (targetId !== '') {
        // 如果框里有名字，先去画布上找找看
        if (document.getElementById(targetId)) {
            // 如果真的有这张卡片，那才是真连上了
            alert("这个选项已经连接到现有的节点 [" + targetId + "] 啦！");
            return;
        }
        // 如果框里有名字，但画布上没有这张卡，那我们就用这个名字建新卡！
    } else {
        // 如果框里是空的，就自动按顺序生成一个新 ID
        targetId = 'N' + (nodeCount++).toString().padStart(3, '0');
        // 防止和别人改过的名字撞车
        while (document.getElementById(targetId)) {
            targetId = 'N' + (nodeCount++).toString().padStart(3, '0');
        }
    }

    // 2. 获取父节点坐标
    const parentNode = document.getElementById(activeEditingNodeId);
    const px = parseFloat(parentNode.style.left);
    const py = parseFloat(parentNode.style.top);

    // 3. 生成新节点 (使用刚才决定的 targetId)
    createNode(px + 350, py + (Math.random() * 60), null, { 
        id: targetId, role: '', storyData: '[]', choicesData: '[]', conditions: '' 
    }); 

    // 4. 把正确的 ID 填入当前选项框，并同步保存
    targetInput.value = targetId;
    syncChoicesToNode();

    // 给点反馈
    const oldText = btn.innerText;
    btn.innerText = '✅ 已生成';
    btn.style.background = '#2ea043';
    setTimeout(() => { btn.innerText = oldText; btn.style.background = ''; }, 1000);

    // 触发历史存档
    if (typeof saveToLocal === 'function') saveToLocal(true, true);
}

// 同步选项数据到卡片，并触发连线重绘
function syncChoicesToNode() {
    if (!activeEditingNodeId) return;
    const node = document.getElementById(activeEditingNodeId);
    const container = document.getElementById('choices-container');
    if (!container) return; // 面板没打开时忽略

    const blocks = Array.from(container.querySelectorAll('.choice-edit-block'));
    const choicesData = blocks.map(b => {
        return {
            text: b.querySelector('.choice-text-input').value.trim(),
            target: b.querySelector('.choice-target-input').value.trim()
        };
    });

    node.querySelector('.v-choices-data').value = JSON.stringify(choicesData);
    
    // 更新卡片表面的预览UI
    updateNodeChoicesPreview(node, choicesData);
    
    // 重新画线！
    drawAllLines();
    if (typeof saveToLocal === 'function') saveToLocal(true);
}

function updateNodeChoicesPreview(node, choicesData) {
    const previewContainer = node.querySelector('.node-choices-preview');
    if (choicesData.length === 0) {
        previewContainer.innerHTML = `<div style="color: #666; font-size: 11px;">+ 点击面板编辑选项...</div>`;
        return;
    }

    previewContainer.innerHTML = choicesData.map(c => 
        `<div class="node-choice-item">
            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px;">➔ ${c.text || '未命名选项'}</span>
            <span class="node-choice-target">${c.target ? `[${c.target}]` : '[空]'}</span>
        </div>`
    ).join('');
}
// ================= 撤回/重做系统 (History System) =================
    const MAX_HISTORY = 50; // 最多记录50步
    let historyStack = [];
    let historyIndex = -1;
    let isRestoring = false; // 防止在撤回时触发新的历史记录

    // 提取当前画布的完整快照
    function getSnapshot() {
        const nodes = document.querySelectorAll('.node');
        const data = { viewport: { panX, panY, scale }, nodeCount: nodeCount, globalVars: globalVars, nodes: [] };
        nodes.forEach(node => {
            data.nodes.push({
                id: node.id,
                x: parseFloat(node.style.left),
                y: parseFloat(node.style.top),
                role: node.querySelector('.v-role').value,
                storyData: node.querySelector('.v-story-data').value,
                choicesData: node.querySelector('.v-choices-data') ? node.querySelector('.v-choices-data').value : '[]',
                conditions: node.querySelector('.v-var-data') ? node.querySelector('.v-var-data').value : '[]'
            });
        });
        return JSON.stringify(data);
    }

    let historyTimeout = null; // 新增：用于防抖的定时器

    // 升级版：加入智能防抖 (Debounce) 和 立即记录 (Immediate)
    function recordHistory(immediate = false) {
        if (isRestoring) return; 
        
        const takeSnapshot = () => {
            const currentState = getSnapshot();
            if (historyIndex >= 0 && historyStack[historyIndex] === currentState) return;
            if (historyIndex < historyStack.length - 1) {
                historyStack = historyStack.slice(0, historyIndex + 1);
            }
            historyStack.push(currentState);
            if (historyStack.length > MAX_HISTORY) historyStack.shift();
            else historyIndex++;
        };

        if (immediate) {
            // 如果是添加节点、连线等重大操作，立刻记录
            if (historyTimeout) clearTimeout(historyTimeout);
            takeSnapshot();
        } else {
            // 如果是打字，停顿 800 毫秒后才正式拍下快照
            if (historyTimeout) clearTimeout(historyTimeout);
            historyTimeout = setTimeout(takeSnapshot, 800); 
        }
    }

    // 撤回 (Undo)
    function undoHistory() {
        if (historyIndex > 0) {
            historyIndex--;
            restoreSnapshot(historyStack[historyIndex]);
            showToast('↩ 已撤回', 'info', 1500); // 正常撤回的提示
        } else {
            // 触达边界的提示
            showToast('已经是最初的状态啦', 'warning', 2000); 
        }
    }

    // 重做 (Redo)
    function redoHistory() {
        if (historyIndex < historyStack.length - 1) {
            historyIndex++;
            restoreSnapshot(historyStack[historyIndex]);
            showToast('↪ 已重做', 'info', 1500); // 正常重做的提示
        } else {
            // 触达边界的提示
            showToast('已经是最新状态了', 'warning', 2000); 
        }
    }

    // 读取并还原快照
    function restoreSnapshot(stateStr) {
        isRestoring = true; // 开启保护锁
        try {
            const data = JSON.parse(stateStr);
            globalVars = data.globalVars || [];
            panX = data.viewport.panX; panY = data.viewport.panY; scale = data.viewport.scale;
            nodeCount = data.nodeCount || 1;
            
            // 清空画布并重建
            document.getElementById('canvas').innerHTML = '<svg id="svg-layer"></svg>';
            updateTransform();
            data.nodes.forEach(nData => createNode(nData.x, nData.y, null, nData));
            
            drawAllLines();
            saveToLocal(true); 

            // 👉 智能恢复侧边栏状态
            if (activeEditingNodeId) {
                // 如果当前正在编辑的节点在撤回后依然存在，就刷新面板内容
                if (document.getElementById(activeEditingNodeId)) {
                    openSidePanel(activeEditingNodeId);
                } else {
                    // 只有当这个节点因为撤回而消失时，才关闭面板
                    closeSidePanel();
                }
            }
            
        } catch(e) { console.error("历史快照还原失败", e); }
        
        // 延迟0.1秒解锁，防止输入框的 oninput 晚了一步触发保存
        setTimeout(() => { isRestoring = false; }, 100);
    }

    // 监听键盘快捷键
    window.addEventListener('keydown', (e) => {
        // Ctrl+Z (Windows) 或 Cmd+Z (Mac)
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
            if (e.shiftKey) {
                e.preventDefault(); redoHistory(); // Ctrl+Shift+Z
            } else {
                e.preventDefault(); undoHistory(); // Ctrl+Z
            }
        }
        // Ctrl+Y (Windows常用重做)
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
            e.preventDefault(); redoHistory();
        }
    });

    /**
 * 全局吐司提示函数
 * @param {string} message - 提示文本
 * @param {string} type - 类型: 'success' | 'error' | 'warning' | 'info'
 * @param {number} duration - 显示时长(毫秒)
 */
function showToast(message, type = 'info', duration = 3000) {
  // 1. 确保容器存在
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }

  // 2. 准备图标映射
  const icons = {
    success: '✅',
    error: '❌',
    warning: '⚠️',
    info: '✨'
  };

  // 3. 创建吐司元素
  const toast = document.createElement('div');
  toast.className = `toast-item toast-${type}`;
  toast.innerHTML = `
    <span style="font-size: 16px;">${icons[type] || icons.info}</span>
    <span>${message}</span>
  `;

  // 4. 添加到页面中
  container.appendChild(toast);

  // 5. 定时移除
  setTimeout(() => {
    toast.classList.add('toast-fadeout');
    // 监听消失动画结束，然后从 DOM 中彻底移除节点
    toast.addEventListener('animationend', () => {
      toast.remove();
    });
  }, duration);
}

// ================= 变量弹窗拖拽逻辑 =================
let isDraggingVarModal = false;
let varDragOffsetX = 0;
let varDragOffsetY = 0;

// ================= 变量弹窗与拖拽逻辑 =================
function openVarModal() {
    let modal = document.getElementById('var-modal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'var-modal';
        document.body.appendChild(modal);
        
        // 只在第一次创建时绑定拖拽事件
        window.addEventListener('mousemove', (e) => {
            if (isDraggingVarModal) {
                modal.style.left = (e.clientX - varDragOffsetX) + 'px';
                modal.style.top = (e.clientY - varDragOffsetY) + 'px';
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDraggingVarModal) {
                isDraggingVarModal = false;
                const header = modal.querySelector('.var-header');
                if (header) header.style.cursor = 'grab';
            }
        });
    }
    
    renderVarModal();
    modal.classList.add('active');
    
    // 👇 教程特权：打开弹窗时，把高亮瞬间转移到弹窗上，并且把气泡挪到安全区
    if (document.body.classList.contains('tutorial-active')) {
        document.querySelectorAll('.guide-highlight').forEach(el => el.classList.remove('guide-highlight'));
        modal.classList.add('guide-highlight');
        
        const tooltip = document.getElementById('guide-tooltip');
        if (tooltip) {
            tooltip.style.top = '100px';
            tooltip.style.left = '50px';
        }
    }
    
    // 每次渲染后重新获取 header 并绑定 mousedown（拖拽起手式）
    const header = modal.querySelector('.var-header');
    if (header) {
        header.style.cursor = 'grab';
        header.onmousedown = (e) => {
            isDraggingVarModal = true;
            header.style.cursor = 'grabbing';
            
            // 核心技巧：拖拽前先把 CSS 的 translate 居中属性拔掉，换成纯绝对坐标，防止乱飞
            const rect = modal.getBoundingClientRect();
            modal.style.transform = 'none';
            modal.style.margin = '0';
            modal.style.left = rect.left + 'px';
            modal.style.top = rect.top + 'px';
            
            varDragOffsetX = e.clientX - rect.left;
            varDragOffsetY = e.clientY - rect.top;
            e.preventDefault(); // 防止拖拽时意外选中文本
        };
    }
}

}

    // 把卡片上配置的规则打包存进隐藏输入框
    function syncNodeVars(nodeId) {
        const node = document.getElementById(nodeId);
        const rows = node.querySelectorAll('.var-rule-row');
        const data = [];
        rows.forEach(row => {

    // 终极同步法术：刷新画布上所有卡片的下拉菜单
    function updateAllNodeVarDropdowns() {
        const selects = document.querySelectorAll('.rule-var');
        selects.forEach(select => {
            const currentVal = select.value; // 记住它现在选的是谁
            let optionsHtml = '<option value="">选择变量...</option>';
            if (typeof globalVars !== 'undefined') {
                globalVars.forEach(v => {
                    if (v.name) optionsHtml += `<option value="${v.name}">${v.name}</option>`;
                });
            }
            select.innerHTML = optionsHtml;
            select.value = currentVal; // 恢复选择
        });
    }

    // ================= 全局试玩：变量裁判与 HUD 系统 =================
    let playState = {}; // 游戏运行时的“内存”，用来记录玩家当前的数值

    // 1. 初始化试玩状态（每次点击全局试玩时调用）
    function initPlayState() {
        playState = {};
        if (typeof globalVars !== 'undefined') {
            globalVars.forEach(v => {
                // 把字符串转换成数字，如果不是数字就存字符串
                playState[v.name] = isNaN(v.value) ? v.value : parseFloat(v.value);
            });
        }
        updateHUD();
    }

    // 2. 核心魔法：解析卡片上的积木规则
    // isCheckOnly = true 时，只判断让不让进（门卫）；
    // isCheckOnly = false 时，真正扣血/加血（记账员）。
    // 2. 核心魔法：解析卡片上的积木规则
    function processNodeRules(nodeId, isCheckOnly = false) {
        const node = document.getElementById(nodeId);
        if (!node) return true; 
        
        let rules = [];
        try { rules = JSON.parse(node.querySelector('.v-var-data').value || '[]'); } catch(e) {}
        
        for (let rule of rules) {
            const vName = (rule.varName || "").trim();
            const currentVal = playState[vName] || 0; // 如果找不到变量，默认当做 0
            const targetVal = isNaN(rule.val) ? rule.val : parseFloat(rule.val);
            
            // 【条件门卫】：查数值，如果不满足直接拦截！
            if (rule.op === '>' && !(currentVal > targetVal)) return false;
            if (rule.op === '>=' && !(currentVal >= targetVal)) return false;
            if (rule.op === '<' && !(currentVal < targetVal)) return false;
            if (rule.op === '<=' && !(currentVal <= targetVal)) return false;
            if (rule.op === '==' && !(currentVal === targetVal)) return false;
            
            // 【执行记账】：只有在真正进入节点时（isCheckOnly 为 false），才去改变数值
            if (!isCheckOnly) {
                if (rule.op === '=') playState[vName] = targetVal;
                if (rule.op === '+') playState[vName] = currentVal + targetVal;
                if (rule.op === '-') playState[vName] = currentVal - targetVal;
            }
        }
        return true; // 查验全部通过
    }

    // 3. 渲染左上角的 HUD 状态栏
    function updateHUD() {
        let hud = document.getElementById('play-hud');
        if (!hud) {
            hud = document.createElement('div');

            document.getElementById('play-overlay').appendChild(hud);

                <span style="color: #888; margin-right: 8px;">${key}</span> 
                <span style="font-weight: bold; color: var(--accent);">${playState[key]}</span>
            </div>
        `).join('');
    }

            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.2s; border-radius: 4px;
        }
        .choice-btn:hover { 
            background: linear-gradient(90deg, rgba(78,176,165,0.2) 0%, rgba(43,92,92,0.9) 50%, rgba(78,176,165,0.2) 100%);
            color: #fff; border-color: #4eb0a5; transform: scale(1.02); box-shadow: 0 0 15px rgba(78, 176, 165, 0.4);
        }
        .choice-btn:active { transform: scale(0.98); background: #4eb0a5; color: #000; }

        .ending-screen {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            animation: cinematicFade 2s ease-in-out forwards;
        }
        .ending-title { font-size: 24px; color: #888; letter-spacing: 6px; margin-bottom: 20px; }
        .ending-name { font-size: 48px; color: #ff6b6b; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 30px rgba(255, 107, 107, 0.5); }
        .restart-btn { margin-top: 60px; padding: 12px 30px; background: transparent; border: 1px solid #555; color: #888; cursor: pointer; border-radius: 4px; font-size: 16px; transition: 0.3s; }
        .restart-btn:hover { border-color: #eee; color: #eee; }
    </style>
</head>
<body>
    <div id="hud" class="hud"></div>
    <div id="choices" class="choices"></div>
    
    <div id="dialogue-wrapper" class="dialogue-wrapper">
        <div id="dialogue-box" class="dialogue-box" onclick="advancePlay()">
            <div id="name" class="name"></div>
            <div id="text" class="text"></div>
            <div id="next-arrow" class="next-arrow"></div>
        </div>
    </div>

    <div id="ending-screen" class="ending-screen">
        <div class="ending-title">达成结局</div>
        <div id="ending-name" class="ending-name"></div>
        <button class="restart-btn" onclick="location.reload()">重新开始旅程</button>
    </div>

    <script>
        const gameData = ${JSON.stringify(gameData)};
        const rootNodeId = "${rootNodeId}";
        
        let playState = {};
        let currentNodeId = null;
        let currentSequence = [];
        let seqIndex = 0;

        let typeTimer = null;
        let isTyping = false;
        let targetHtml = "";

        function updateHUD() {
            document.getElementById('hud').innerHTML = Object.keys(playState).map(k => 
                \`<div class="hud-item">\${k}<span class="hud-val">\${playState[k]}</span></div>\`
            ).join('');
        }

        function processRules(nodeId) {
            const rules = gameData.nodes[nodeId].conditions || [];
            for (let rule of rules) {
                const vName = (rule.varName || "").trim();
                const currentVal = playState[vName] || 0; 
                const targetVal = isNaN(rule.val) ? rule.val : parseFloat(rule.val);
                
                if (rule.op === '>' && !(currentVal > targetVal)) return false;
                if (rule.op === '>=' && !(currentVal >= targetVal)) return false;
                if (rule.op === '<' && !(currentVal < targetVal)) return false;
                if (rule.op === '<=' && !(currentVal <= targetVal)) return false;
                if (rule.op === '==' && !(currentVal === targetVal)) return false;
                
                if (rule.op === '=') playState[vName] = targetVal;
                if (rule.op === '+') playState[vName] = currentVal + targetVal;
                if (rule.op === '-') playState[vName] = currentVal - targetVal;
            }
            return true;
        }

        function evaluateBlockCondition(condStr) {
            if (!condStr) return true; 
            try {
                const rangeMatch = condStr.match(/^(-?\\d+(?:\\.\\d+)?)\\s*<=\\s*([a-zA-Z0-9_\\u4e00-\\u9fa5]+)\\s*<=\\s*(-?\\d+(?:\\.\\d+)?)$/);
                if (rangeMatch) {
                    const minVal = parseFloat(rangeMatch[1]);
                    const vName = rangeMatch[2];
                    const maxVal = parseFloat(rangeMatch[3]);
                    const currentVal = playState[vName] || 0;
                    return currentVal >= minVal && currentVal <= maxVal; 
                }
                const singleMatch = condStr.match(/^([a-zA-Z0-9_\\u4e00-\\u9fa5]+)\\s*(>=|<=|>|<|==)\\s*(-?\\d+(?:\\.\\d+)?)$/);
                if (singleMatch) {
                    const vName = singleMatch[1];
                    const op = singleMatch[2];
                    const targetVal = parseFloat(singleMatch[3]);
                    const currentVal = playState[vName] || 0;
                    
                    if (op === '>' && !(currentVal > targetVal)) return false;
                    if (op === '>=' && !(currentVal >= targetVal)) return false;
                    if (op === '<' && !(currentVal < targetVal)) return false;
                    if (op === '<=' && !(currentVal <= targetVal)) return false;
                    if (op === '==' && !(currentVal === targetVal)) return false;
                    return true;
                }
            } catch(e) { return true; }
            return true; 
        }

        function startGame(nodeId) {
            gameData.globalVars.forEach(v => playState[v.name] = parseFloat(v.value) || 0);
            document.getElementById('ending-screen').style.display = 'none';
            enterNode(nodeId);
        }

        function enterNode(nodeId) {
            currentNodeId = nodeId;
            const node = gameData.nodes[nodeId];
            if (!node) return;
            
            processRules(nodeId);
            updateHUD();
            
            currentSequence = node.storyData;
            seqIndex = 0;
            document.getElementById('choices').style.display = 'none';
            document.getElementById('dialogue-wrapper').style.display = 'block';
            renderBlock();
        }

        function typeWriter(elementId, htmlString) {
            const el = document.getElementById(elementId);
            clearInterval(typeTimer);
            el.innerHTML = '';
            targetHtml = htmlString;
            isTyping = true;
            document.getElementById('next-arrow').style.display = 'none';

            let i = 0;
            let currentTag = '';
            let inTag = false;

            typeTimer = setInterval(() => {
                if (i >= htmlString.length) {
                    completeTyping(elementId);
                    return;
                }
                
                let char = htmlString[i];
                if (char === '<') inTag = true;
                
                if (inTag) {
                    currentTag += char;
                    if (char === '>') {
                        inTag = false;
                        el.innerHTML += currentTag;
                        currentTag = '';
                    }
                } else {
                    el.innerHTML += char;
                }
                i++;
            }, 35); 
        }

        function completeTyping(elementId) {
            clearInterval(typeTimer);
            document.getElementById(elementId).innerHTML = targetHtml;
            isTyping = false;
            document.getElementById('next-arrow').style.display = 'block';
        }

        function renderBlock() {
            if (seqIndex >= currentSequence.length) {
                showChoices();
                return;
            }
            const block = currentSequence[seqIndex];
            
            if (block.condition && !evaluateBlockCondition(block.condition)) {
                seqIndex++;
                renderBlock();
                return;
            }
            
            if (block.type === 'ending') {
                document.getElementById('dialogue-wrapper').style.display = 'none';
                document.getElementById('ending-name').innerHTML = block.text || '未命名结局';
                document.getElementById('ending-screen').style.display = 'flex';
                return;
            }

            const nameEl = document.getElementById('name');
            const textEl = document.getElementById('text');
            
            if (block.type === 'dialogue' && block.role) {
                nameEl.style.display = 'block';
                nameEl.innerText = block.role;
                textEl.className = 'text';
            } else {
                nameEl.style.display = 'none';
                textEl.className = 'text text-desc';
            }

            typeWriter('text', block.text);
        }

        function advancePlay() {
            if (isTyping) {
                completeTyping('text');
                return;
            }
            seqIndex++;
            renderBlock();
        }

        function showChoices() {
            document.getElementById('dialogue-wrapper').style.display = 'none';
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            const choices = gameData.nodes[currentNodeId].choicesData;
            if (choices.length === 0) {
                choicesDiv.innerHTML = \`<div class="choice-btn" onclick="location.reload()">[ 旅途结束 / 点击重置 ]</div>\`;
            } else {
                choices.forEach(c => {
                    const btn = document.createElement('div');
                    btn.className = 'choice-btn';
                    
                    const tNode = gameData.nodes[c.target];
                    if (!tNode) {
                         btn.innerText = \`➔ [前路未卜] \${c.text}\`;
                         btn.style.opacity = '0.5';
                         btn.style.cursor = 'not-allowed';
                    } else {
                        let canEnter = true;
                        const targetRules = tNode.conditions || [];
                        for (let rule of targetRules) {
                            const vName = (rule.varName || "").trim();
                            const currentVal = playState[vName] || 0; 
                            const targetVal = isNaN(rule.val) ? rule.val : parseFloat(rule.val);
                            if (rule.op === '>' && !(currentVal > targetVal)) canEnter = false;
                            if (rule.op === '>=' && !(currentVal >= targetVal)) canEnter = false;
                            if (rule.op === '<' && !(currentVal < targetVal)) canEnter = false;
                            if (rule.op === '<=' && !(currentVal <= targetVal)) canEnter = false;
                            if (rule.op === '==' && !(currentVal === targetVal)) canEnter = false;
                        }
                        
                        if (canEnter) {
                            btn.innerText = c.text;
                            btn.onclick = () => enterNode(c.target);
                        } else {
                            btn.innerHTML = \`🔒 <span style="font-size:14px; color:#888;">[检定失败]</span> \${c.text}\`;
                            btn.style.opacity = '0.4';
                            btn.style.cursor = 'not-allowed';
                            btn.style.background = 'rgba(0,0,0,0.6)';
                        }
                    }
                    choicesDiv.appendChild(btn);
                });
            }
            choicesDiv.style.display = 'flex';
        }

        startGame(rootNodeId);
    ${'</' + 'script>'}
</body>
</html>`;

    // 4. 触发下载
    const blob = new Blob([htmlTemplate], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${fileName}.html`; // 这里使用了你输入的文件名
    a.click();
    URL.revokeObjectURL(url);
}
</script>

<!-- 侧边栏结构开始 -->
    <div id="side-panel" class="side-panel">
        <div class="panel-header">
            <span id="panel-title">编辑剧情序列</span>
            <button id="btn-close-panel" class="btn" onclick="closeSidePanel()">关闭</button>
        </div>
        <div class="panel-toolbar">
            <button id="btn-add-dialogue" class="btn" onclick="addBlock('dialogue')" style="background: #2b5c5c; border-color:#3e827a;">+ 台词</button>
            <button id="btn-add-desc" class="btn" onclick="addBlock('desc')">+ 描写</button>
            <button id="btn-add-ending" class="btn" onclick="addBlock('ending')" style="background: #5c2b2b; border-color:#8c3b3b; color: #ff9999;">+ 结局标记</button>
            <span class="divider"></span>
            <button type="button" class="btn" style="padding: 4px 8px; margin-right: 4px;" onclick="formatBlockText('bold')" title="加粗"><b>B</b></button>
            <button type="button" class="btn" style="padding: 4px 8px; margin-right: 4px;" onclick="formatBlockText('italic')" title="斜体"><i>I</i></button>
            <button type="button" class="btn" style="padding: 4px 8px; margin-right: 4px;" onclick="formatBlockText('underline')" title="下划线"><u>U</u></button>
            <button type="button" class="btn" style="padding: 4px 8px; margin-right: 4px;" onclick="formatBlockText('justifyLeft')" title="左对齐">⫷</button>
            <button type="button" class="btn" style="padding: 4px 8px; margin-right: 0;" onclick="formatBlockText('justifyCenter')" title="居中">≡</button>
        </div>
        
        <div id="panel-editor" class="panel-editor" style="background: #151515;"></div>
    </div>
    <!-- 侧边栏结构结束 -->
        
  
    <!-- 试玩模式界面 -->
    <div id="play-overlay">
        
        <div id="play-ending-screen">
            <div class="ending-title">达成结局</div>

        </div>
        <button class="play-close" onclick="closePlayMode()">×</button>
        <div id="play-choices" class="play-choices"></div>
