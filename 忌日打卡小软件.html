<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皂队露露忌日发文小工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #00d26a; /* 战术绿 */
            --accent-alt: #00a854;
            --warning: #ffaa00; /* 提醒黄 */
            --box-bg: #2d2d2d;
            --border: #404040;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0 0 10px 0; color: var(--accent); letter-spacing: 2px; }
        
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; }
        .card { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; flex: 1; min-width: 150px; }
        .card-title { font-size: 14px; color: #aaa; }
        .card-value { font-size: 24px; color: var(--accent); font-weight: bold; margin-top: 8px; }
        .card-value.warning { color: var(--warning); }
        
        .upload-section { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--accent); margin-bottom: 30px; width: 100%; max-width: 900px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; box-sizing: border-box; }
        input, button { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--box-bg); color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { background: var(--accent-alt); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; max-width: 900px; }
        .day-box { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; min-height: 90px; display: flex; flex-direction: column; position: relative; }
        .day-box.is-today { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .date-label { font-size: 12px; color: #888; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 4px; }
        
        .target-badge { font-size: 11px; background: rgba(255, 170, 0, 0.15); color: var(--warning); padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block; width: fit-content;}
        .target-badge.mega { background: rgba(0, 210, 106, 0.2); color: var(--accent); border: 1px solid var(--accent); font-weight: bold; }
        
        .post-item { font-size: 11px; color: var(--text-main); background: var(--box-bg); padding: 3px 5px; border-radius: 3px; margin-bottom: 3px; border-left: 2px solid var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .post-count { font-size: 11px; color: var(--accent); text-align: right; margin-top: auto; padding-top: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>皂队露露忌日发文小工具</h1>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">总存稿进度</div>
            <div class="card-value"><span id="total-done">0</span> / 141</div>
        </div>
        <div class="card">
            <div class="card-title">建议日均需写</div>
            <div class="card-value" id="daily-write-target">0.00</div>
        </div>
        <div class="card">
            <div class="card-title">今日发布要求</div>
            <div class="card-value warning" id="today-publish-target">-</div>
        </div>
    </div>

    <div class="upload-section">
        <span style="color: var(--accent); font-weight: bold;">[存稿入库]</span>
        <input type="date" id="post-date" required title="计划发布日期">
        <input type="text" id="post-title" placeholder="文章标题/梗概" required style="flex:1; min-width:150px;">
        <input type="file" id="post-file" accept=".txt,.md,.docx,.pdf">
        <button onclick="uploadPost()" id="upload-btn">提交上传</button>
    </div>

    <div class="calendar-grid" id="calendar">
        </div>

    <script>
        // ==========================================
        // 记得在这里填入你的钥匙！
        // ==========================================
        const SUPABASE_URL = 'https://bhfbtnylovoettdgvuzj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_afZtwvnLJunR_uFDVxQvjg_t_ZqCkoO';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TOTAL_POSTS = 141;
        const START_DATE = new Date('2026-06-13');
        const END_DATE = new Date('2026-10-11');
        
        let existingPosts = [];

        // 智能核心：计算每一天应该发几篇
        function getPublishTarget(dateString) {
            if (dateString < '2026-08-15' || dateString > '2026-10-11') return 0;
            if (dateString === '2026-08-15' || dateString === '2026-10-11') return 24;

            // 中间56天 2-2-1 节奏排期计算
            const start = new Date('2026-08-16').getTime();
            const current = new Date(dateString).getTime();
            const diffDays = Math.floor((current - start) / (1000 * 3600 * 24));

            if (dateString === '2026-10-10') return 1; // 10.10特殊微调收尾
            return (diffDays % 3 === 2) ? 1 : 2;
        }

        // 格式化日期为 YYYY-MM-DD 本地时区防偏移
        function formatDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function init() {
            await fetchPosts();
            renderDashboard();
            renderCalendar();
        }

        async function fetchPosts() {
            const { data, error } = await client.from('ghostsoap').select('*');
            if (error) console.error("数据拉取失败:", error);
            else existingPosts = data;
        }

        function renderDashboard() {
            const doneCount = existingPosts.length;
            document.getElementById('total-done').innerText = doneCount;

            const now = new Date();
            const todayStr = formatDate(now);
            
            // 算今日发文
            const pubTarget = getPublishTarget(todayStr);
            document.getElementById('today-publish-target').innerText = pubTarget > 0 ? `发 ${pubTarget} 篇` : "无发文任务";

            // 算日均需写
            const timeDiff = END_DATE.getTime() - now.getTime();
            const daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));
            const remainingPosts = TOTAL_POSTS - doneCount;

            let writeTarget = 0;
            if (daysLeft > 0 && remainingPosts > 0) {
                writeTarget = (remainingPosts / daysLeft).toFixed(2);
            } else if (remainingPosts <= 0) {
                writeTarget = "0 (已完结!)";
            }
            document.getElementById('daily-write-target').innerText = writeTarget;
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            const todayStr = formatDate(new Date());
            let currentDate = new Date(START_DATE);
            
            while (currentDate <= END_DATE) {
                const dateString = formatDate(currentDate);
                const box = document.createElement('div');
                box.className = 'day-box';
                if (dateString === todayStr) box.classList.add('is-today');
                
                // 日期头
                const dateLabel = document.createElement('div');
                dateLabel.className = 'date-label';
                const dayOfWeek = ['日','一','二','三','四','五','六'][currentDate.getDay()];
                dateLabel.innerText = `${currentDate.getMonth() + 1}/${currentDate.getDate()} (周${dayOfWeek})`;
                box.appendChild(dateLabel);

                // 智能标注：发文目标
                const targetCount = getPublishTarget(dateString);
                if (targetCount > 0) {
                    const badge = document.createElement('div');
                    badge.className = targetCount === 24 ? 'target-badge mega' : 'target-badge';
                    badge.innerText = targetCount === 24 ? `🚀 发文: ${targetCount}篇` : `🎯 需发: ${targetCount}篇`;
                    box.appendChild(badge);
                }

                // 显示当天绑定的存稿
                const postsToday = existingPosts.filter(p => p.target_date === dateString);
                postsToday.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'post-item';
                    item.innerText = post.title;
                    box.appendChild(item);
                });

                // 进度对比底部角标
                if (targetCount > 0) {
                    const progress = document.createElement('div');
                    progress.className = 'post-count';
                    progress.innerText = `存稿 ${postsToday.length}/${targetCount}`;
                    if (postsToday.length >= targetCount) {
                        progress.style.color = '#fff';
                        box.style.background = 'rgba(0, 210, 106, 0.1)';
                        box.style.borderColor = 'var(--accent)';
                    }
                    box.appendChild(progress);
                }

                calendar.appendChild(box);
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        async function uploadPost() {
            const dateInput = document.getElementById('post-date').value;
            const titleInput = document.getElementById('post-title').value;
            const fileInput = document.getElementById('post-file').files[0];
            const btn = document.getElementById('upload-btn');

            if (!dateInput || !titleInput) return alert("请选择排期日期并填写标题！");

            btn.innerText = "上传中...";
            btn.disabled = true;

            try {
                let filePath = null;
                if (fileInput) {
                    const fileExt = fileInput.name.split('.').pop();
                    const fileName = `${dateInput}_${Date.now()}.${fileExt}`;
                    const { data: uploadData, error: uploadError } = await client.storage
                        .from('manuscripts').upload(`docs/${fileName}`, fileInput);
                    if (uploadError) throw uploadError;
                    filePath = uploadData.path;
                }

                const { error: dbError } = await client.from('ghostsoap').insert([
                    { target_date: dateInput, title: titleInput, file_path: filePath }
                ]);

                if (dbError) throw dbError;

                document.getElementById('post-title').value = '';
                document.getElementById('post-file').value = '';
                await init(); 
            } catch (error) {
                console.error(error);
                alert("上传失败: " + error.message);
            } finally {
                btn.innerText = "提交上传";
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
